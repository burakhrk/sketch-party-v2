<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sketch Party Auth</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        display: grid;
        place-items: center;
        height: 100vh;
        color: #e5e7eb;
        background: #0b1021;
      }
      .card {
        padding: 16px 20px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
      }
    </style>
  </head>
  <body>
    <div class="card" id="card">Completing sign-in…</div>
    <script type="module">
      const params = new URLSearchParams(location.search);
      const accountId = params.get('accountId') || params.get('userId') || undefined;
      const email = params.get('email') || undefined;
      const plan = params.get('plan') || undefined;
      const patreonStatus = params.get('patreon') || params.get('status');
      chrome.runtime.sendMessage({ type: 'auth-callback', accountId, email, plan });
      if (patreonStatus) {
        chrome.runtime.sendMessage({ type: 'patreon-result', success: patreonStatus === 'success' });
      }
      document.getElementById('card').textContent = 'You are signed in. You can close this tab.';
      setTimeout(() => window.close(), 1500);
    </script>
  </body>
</html>
